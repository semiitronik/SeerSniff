<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>SeerSniff Telemetry</title>
    <style>
        body { font-family: system-ui, Arial, sans-serif; margin: 20px; }
        .row { display: flex; gap: 16px; flex-wrap: wrap; }
        .card { border: 1px solid #3a1c38; border-radius: 10px; padding: 14px; min-width: 260px; }
        .muted { color: #666; }
        pre { background: #fbe6fd; padding: 12px; border-radius: 10px; overflow: auto; }
        .ok { color: #0a7; font-weight: 600; }
        .bad { color: #c00; font-weight: 600; }

        .alertCard {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #000000;
            white-space: pre-wrap;
        }
        .pktRow { padding:10px; border-bottom:1px solid #eee; cursor:pointer; font-family: ui-monospace, Consolas, monospace; }
        .pktRow:hover { background:#f5f5f5; }
        .pktHIGH { background: #da7272; }   /* like your FlatLaf high alert */
        .pktMEDIUM { background: #e4b670; } /* like your FlatLaf medium alert */
        .pktLOW { background: #d5d885; }
        .pktSelected { outline: 2px solid #f6a9f2; }
    </style>
</head>

<body>
<h1>SeerSniff Dashboard</h1>

<div class="row">
    <div class="card">
        <div class="muted">WebSocket</div>
        <div id="wsStatus" class="bad">Disconnected</div>
    </div>

    <div class="card">
        <div class="muted">Sensor</div>
        <div id="sensorId">—</div>
    </div>

    <div class="card">
        <div class="muted">Capturing</div>
        <div id="capturing">—</div>
    </div>

    <div class="card">
        <div class="muted">Packets</div>
        <div><span id="packetsCaptured">—</span> captured</div>
        <div><span id="packetsDropped">—</span> dropped</div>
        <div><span id="packetsPerSec">—</span> / sec</div>
    </div>
</div>

<h2>Latest telemetry</h2>
<pre id="raw">Waiting for telemetry…</pre>
<h2>Sensor control</h2>
<div class="row">
    <div class="card">
        <div class="muted">Interface index</div>
        <input id="ifaceIndex" type="number" value="0" style="width:100%; padding:8px; margin-top:8px;"/>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button onClick="sendCmd('SELECT_INTERFACE')">Select</button>
            <button onClick="sendCmd('START')">Start</button>
            <button onClick="sendCmd('STOP')">Stop</button>
            <button onclick="sendCmd('TEST_ALERT')">Test Alert</button>
        </div>
        <div class="muted" style="margin-top:10px;">
            Tip: click Select then Start
        </div>
    </div>
</div>
<h2>Packets</h2>
<div style="display:flex; gap:16px; align-items:flex-start;">
    <div id="packetList" style="width:45%; max-height:520px; overflow:auto; border:1px solid #b8a4bd; border-radius:10px;"></div>

    <div style="flex:1;">
        <div class="muted">Selected packet details</div>
        <pre id="packetDetails" style="max-height:520px;">Click a packet…</pre>
    </div>
</div>
<h2>Alerts</h2>
<div id="alerts"></div>

<!-- SockJS + STOMP (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script>
    const wsStatus = document.getElementById("wsStatus");
    const raw = document.getElementById("raw");

    const sensorIdEl = document.getElementById("sensorId");
    const capturingEl = document.getElementById("capturing");
    const packetsCapturedEl = document.getElementById("packetsCaptured");
    const packetsDroppedEl = document.getElementById("packetsDropped");
    const packetsPerSecEl = document.getElementById("packetsPerSec");

    const alertsBox = document.getElementById("alerts");

    function setConnected(yes) {
        wsStatus.textContent = yes ? "Connected" : "Disconnected";
        wsStatus.className = yes ? "ok" : "bad";
    }


    const SENSOR_ID = "desktop-sniffer-1";
    let selectedPacketId = null;

    async function sendCmd(type) {
        const ifaceIndex = Number(document.getElementById("ifaceIndex").value);
        const cmd = {
            sensorId: SENSOR_ID,
            type,
            ifaceIndex: (type === "STOP") ? null : ifaceIndex
        };

        await fetch("/command/send", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(cmd)
        });
    }

    function renderAlert(alert) {
        if (!alertsBox) return;

        const div = document.createElement("div");
        div.className = "alertCard";

        // simple color rules
        if (alert.severity === "HIGH") div.style.background = "#da7272";
        else if (alert.severity === "MEDIUM") div.style.background = "#e4b670";
        else div.style.background = "#f6f6f6";

        const reasons = Array.isArray(alert.reasons) ? alert.reasons : [];
        div.textContent =
            `[${alert.severity}] score=${alert.score}\n` +
            `${alert.summary ?? ""}\n\n` +
            `reasons:\n- ${reasons.join("\n- ")}`;

        alertsBox.prepend(div);
    }

    // Connect to Spring endpoint: /ws (SockJS)
    const socket = new SockJS("/ws");
    const stomp = Stomp.over(socket);
    // Enable STOMP client debug logs (prints frame-level info)
    stomp.debug = (msg) => console.debug("[STOMP]", msg);

    // Attempt connect — empty headers works for simple setup
    stomp.connect({}, function(frame) {
        console.log("[STOMP] connected", frame);
        setConnected(true);

        stomp.subscribe("/topic/alerts", (msg) => {
            const alert = JSON.parse(msg.body);
            renderAlert(alert);
        });
        stomp.subscribe("/topic/packets", (msg) => {
            const p = JSON.parse(msg.body);
            renderPacketRow(p);
        });

        // TELEMETRY
        stomp.subscribe("/topic/telemetry", (msg) => {
            const telemetry = JSON.parse(msg.body);

            sensorIdEl.textContent = telemetry.sensorId ?? "—";
            capturingEl.textContent = String(telemetry.capturing);
            packetsCapturedEl.textContent = telemetry.packetsCaptured ?? "—";
            packetsDroppedEl.textContent = telemetry.packetsDropped ?? "—";
            packetsPerSecEl.textContent = telemetry.packetsPerSec ?? "—";

            raw.textContent = JSON.stringify(telemetry, null, 2);
        });


    }, (err) => {
        setConnected(false);
        raw.textContent = "WebSocket error:\n" + JSON.stringify(err, null, 2);
    });
    const packetListEl = document.getElementById("packetList");
    const packetDetailsEl = document.getElementById("packetDetails");




    function severityClass(sev) {
        if (sev === "HIGH") return "pktHIGH";
        if (sev === "MEDIUM") return "pktMEDIUM";
        return "pktLOW";
    }

    function renderPacketRow(p) {
        const div = document.createElement("div");
        div.className = `pktRow ${severityClass(p.severity)}`;

        // Keep the list text short & readable:
        const line =
            `[${p.severity}] score=${p.score} id=${p.packetId}  ` +
            `${p.protocol ?? ""} ` +
            `${p.srcIp ?? ""}${p.srcPort ? ":"+p.srcPort : ""} -> ${p.dstIp ?? ""}${p.dstPort ? ":"+p.dstPort : ""}`;

        div.textContent = line;

        div.onclick = async () => {
            selectedPacketId = p.packetId;

            // clear prior selection outline
            document.querySelectorAll(".pktRow").forEach(x => x.classList.remove("pktSelected"));
            div.classList.add("pktSelected");

            // fetch details
            const res = await fetch(`/ingest/packet/${encodeURIComponent(SENSOR_ID)}/${p.packetId}`);
            const details = await res.json();

            if (!details) {
                packetDetailsEl.textContent = "No details found for packetId=" + p.packetId;
                return;
            }

            // show like FlatLaf PacketDetails view
            packetDetailsEl.textContent =
                `packetId: ${details.packetId}\n` +
                `severity: ${details.severity}  score: ${details.score}\n` +
                `ts: ${new Date(details.ts).toISOString()}\n\n` +
                `reasons:\n- ${(details.reasons ?? []).join("\n- ")}\n\n` +
                `ruleScores:\n${JSON.stringify(details.ruleScores ?? {}, null, 2)}\n\n` +
                `raw:\n${details.rawText ?? ""}`;
        };

        // newest on top like alerts
        packetListEl.prepend(div);

        // prevent infinite DOM growth
        while (packetListEl.children.length > 800) {
            packetListEl.removeChild(packetListEl.lastChild);
        }
    }

    // On load: fetch last N packets so list isn't empty
    (async function loadRecentPackets(){
        try {
            const res = await fetch(`/ingest/packets/${encodeURIComponent(SENSOR_ID)}?limit=200`);
            if (!res.ok) return;
            const list = await res.json();
            list.forEach(renderPacketRow);
        } catch (e) {}
    })();

    // In your stomp.connect success:
    // stomp.subscribe("/topic/packets", (msg) => { renderPacketRow(JSON.parse(msg.body)); });
</script>

</body>
</html>
